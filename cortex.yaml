# CORTEX daemon configuration.
# Secrets (GitHub OAuth) are loaded from environment variables:
#   CORTEX_GITHUB_CLIENT_ID, CORTEX_GITHUB_CLIENT_SECRET
# The official desktop build supplies its GitHub OAuth client identity.

server:
  port: 8090
  mcp_port: 8091
  data_dir: ~/.cortex

github:
  client_id: "Ov23liIGsZJLehp5Dez2"
  client_secret: "58afe5d8e52d2057b174052ed27fdd5ce3589748"

scanner:
  interval_minutes: 30
  max_file_size_kb: 500
  ignored_dirs:
    - node_modules
    - .git
    - dist
    - build
    - target
    - __pycache__
    - .venv
    - vendor
  ignored_extensions:
    - .lock
    - .sum
    - .min.js
    - .map

search:
  # Set to true and run Ollama + a LanceDB sidecar to enable semantic search.
  enable_semantic: false
  ollama_url: "http://localhost:11434"
  embedding_model: "bge-m3"
  # URL of the local LanceDB sidecar (see internal/vector/lancedb.go contract).
  vector_db_url: "http://localhost:8123"

sync:
  auto_sync: true
  sync_on_push: true

env: development
log_level: info
